<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1280"
  height="640"
  viewBox="0 0 1280 640"
  role="img"
  aria-labelledby="social-card-title social-card-desc"
>
  <title id="social-card-title">eslint-plugin-repo social card</title>
  <desc id="social-card-desc">
    A wide social share card for eslint-plugin-repo featuring repository compliance messaging,
    provider chips, and a stylized repository dashboard panel.
  </desc>
  <defs>
    <linearGradient id="bg-gradient" x1="64" y1="32" x2="1216" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#152B57" />
      <stop offset="0.36" stop-color="#2F7CFF" />
      <stop offset="0.72" stop-color="#5A9BFF" />
      <stop offset="1" stop-color="#7DE7C0" />
    </linearGradient>
    <radialGradient id="glow-purple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1060 102) rotate(90) scale(240)">
      <stop offset="0" stop-color="#ABA6FF" stop-opacity="0.54" />
      <stop offset="1" stop-color="#ABA6FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 552) rotate(90) scale(220)">
      <stop offset="0" stop-color="#58C2FF" stop-opacity="0.48" />
      <stop offset="1" stop-color="#58C2FF" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel-gradient" x1="716" y1="120" x2="1152" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101D37" stop-opacity="0.95" />
      <stop offset="1" stop-color="#08111F" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="card-gradient-1" x1="780" y1="190" x2="1080" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF4FF" />
      <stop offset="1" stop-color="#C7DCFF" />
    </linearGradient>
    <linearGradient id="card-gradient-2" x1="780" y1="278" x2="1080" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D5CBFF" />
      <stop offset="1" stop-color="#9ADFFF" />
    </linearGradient>
    <linearGradient id="card-gradient-3" x1="780" y1="364" x2="1080" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9EF0D3" />
      <stop offset="1" stop-color="#FFE596" />
    </linearGradient>
    <filter id="panel-shadow" x="660" y="90" width="560" height="470" filterUnits="userSpaceOnUse">
      <feOffset dy="18" />
      <feGaussianBlur stdDeviation="26" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.015 0 0 0 0 0.03 0 0 0 0 0.08 0 0 0 0.34 0"
      />
      <feBlend in="SourceGraphic" mode="normal" />
    </filter>
  </defs>

