      <text x="24" y="22" fill="#F7FBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="700">Flat Config</text>
    </g>
    <g transform="translate(242 548)">
      <rect width="104" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.14" />
      <text x="28" y="22" fill="#F7FBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="700">Presets</text>
    </g>
    <g transform="translate(360 548)">
      <rect width="92" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.14" />
      <text x="30" y="22" fill="#F7FBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="16" font-weight="700">Rules</text>
    </g>
    <g transform="translate(466 548)">
