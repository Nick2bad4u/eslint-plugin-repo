<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="logo-title logo-desc"
>
  <title id="logo-title">eslint-plugin-repo logo</title>
  <desc id="logo-desc">
    A rounded-square repository compliance badge with layered repository cards,
    provider nodes, and a verification checkmark.
  </desc>
  <defs>
    <linearGradient id="bg-gradient" x1="52" y1="40" x2="456" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C5CFF" />
      <stop offset="0.48" stop-color="#4D79FF" />
      <stop offset="1" stop-color="#43D7FF" />
    </linearGradient>
    <linearGradient id="glass-gradient" x1="108" y1="114" x2="418" y2="414" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11203B" stop-opacity="0.94" />
      <stop offset="1" stop-color="#08111F" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="card-gradient" x1="132" y1="154" x2="382" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF3FF" />
      <stop offset="1" stop-color="#C7DAFF" />
    </linearGradient>
    <linearGradient id="card-gradient-2" x1="132" y1="224" x2="382" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CBBEFF" />
      <stop offset="1" stop-color="#95EBFF" />
    </linearGradient>
    <linearGradient id="card-gradient-3" x1="132" y1="292" x2="382" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9EF0D3" />
      <stop offset="1" stop-color="#FFE08A" />
    </linearGradient>
    <filter id="panel-shadow" x="72" y="92" width="376" height="336" filterUnits="userSpaceOnUse">
      <feOffset dy="18" />
      <feGaussianBlur stdDeviation="22" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.015 0 0 0 0 0.035 0 0 0 0 0.08 0 0 0 0.36 0"
      />
      <feBlend in="SourceGraphic" mode="normal" />
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="124" fill="url(#bg-gradient)" />
  <rect x="34" y="34" width="444" height="444" rx="106" fill="#0A1224" fill-opacity="0.18" />

  <g opacity="0.42">
    <path d="M112 74C191 55 314 60 401 112" stroke="#FFF" stroke-opacity="0.34" stroke-width="8" stroke-linecap="round" />
    <path d="M84 388C146 435 280 456 402 406" stroke="#FFF" stroke-opacity="0.24" stroke-width="8" stroke-linecap="round" />
  </g>

  <g filter="url(#panel-shadow)">
    <rect x="92" y="110" width="328" height="292" rx="46" fill="url(#glass-gradient)" />
    <rect x="108" y="126" width="296" height="260" rx="34" fill="#09111F" fill-opacity="0.55" stroke="#FFF" stroke-opacity="0.08" />

    <rect x="126" y="148" width="260" height="58" rx="18" fill="url(#card-gradient)" />
    <rect x="126" y="220" width="260" height="58" rx="18" fill="url(#card-gradient-2)" />
    <rect x="126" y="292" width="260" height="58" rx="18" fill="url(#card-gradient-3)" />

    <rect x="148" y="166" width="92" height="10" rx="5" fill="#243757" fill-opacity="0.9" />
    <rect x="148" y="184" width="68" height="8" rx="4" fill="#243757" fill-opacity="0.62" />

    <circle cx="162" cy="247" r="8" fill="#243757" />
    <circle cx="218" cy="247" r="8" fill="#243757" />
    <circle cx="274" cy="247" r="8" fill="#243757" />
    <path d="M170 247H210" stroke="#243757" stroke-width="6" stroke-linecap="round" />
    <path d="M226 247H266" stroke="#243757" stroke-width="6" stroke-linecap="round" />
    <path d="M218 247L274 247" stroke="#243757" stroke-width="6" stroke-linecap="round" opacity="0.32" />

    <path d="M154 322L181 340L226 304" fill="none" stroke="#0C3A2A" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="250" y="310" width="98" height="10" rx="5" fill="#1D4D3A" fill-opacity="0.82" />
    <rect x="250" y="330" width="70" height="8" rx="4" fill="#1D4D3A" fill-opacity="0.5" />
  </g>

  <g>
    <path d="M117 135C140 120 152 111 176 96" stroke="#B99EFF" stroke-width="7" stroke-linecap="round" />
    <path d="M395 167C374 152 360 143 336 128" stroke="#89E6FF" stroke-width="7" stroke-linecap="round" />
    <path d="M126 376C149 358 161 350 187 334" stroke="#9EF0D3" stroke-width="7" stroke-linecap="round" />
    <path d="M392 342C370 330 355 320 332 306" stroke="#FFD88C" stroke-width="7" stroke-linecap="round" />

    <circle cx="104" cy="142" r="18" fill="#A98CFF" stroke="#FFF" stroke-opacity="0.35" stroke-width="4" />
    <circle cx="408" cy="176" r="18" fill="#6EE3FF" stroke="#FFF" stroke-opacity="0.35" stroke-width="4" />
    <circle cx="112" cy="388" r="18" fill="#7DE7C0" stroke="#FFF" stroke-opacity="0.35" stroke-width="4" />
    <circle cx="406" cy="352" r="18" fill="#FFD470" stroke="#FFF" stroke-opacity="0.35" stroke-width="4" />
  </g>
</svg>
