    <path d="M948 305H998" stroke="#253A5D" stroke-width="7" stroke-linecap="round" />

    <path d="M854 386L890 410L952 362" fill="none" stroke="#0C3A2A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="992" y="376" width="98" height="12" rx="6" fill="#1D4D3A" fill-opacity="0.82" />
