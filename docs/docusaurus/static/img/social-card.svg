      <text x="27" y="24" fill="#F7FBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="700">🦊 GitLab</text>
    </g>
    <g transform="translate(356 480)">
      <rect width="142" height="38" rx="19" fill="#0A1831" fill-opacity="0.82" stroke="#78E7FF" stroke-opacity="0.48" />
      <text x="24" y="24" fill="#F7FBFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="700">🪣 Bitbucket</text>
