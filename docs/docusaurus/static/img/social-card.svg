      <circle cx="790" cy="172" r="22" fill="#ABA6FF" stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="5" />
      <circle cx="1118" cy="202" r="22" fill="#78E7FF" stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="5" />
      <circle cx="800" cy="456" r="22" fill="#8BEDDF" stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="5" />
      <circle cx="1112" cy="432" r="22" fill="#FFC68F" stroke="#FFFFFF" stroke-opacity="0.36" stroke-width="5" />
