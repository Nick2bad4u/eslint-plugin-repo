  <rect x="28" y="28" width="1224" height="584" rx="36" fill="#08111F" fill-opacity="0.12" />
  <circle cx="1060" cy="102" r="240" fill="url(#glow-purple)" />
  <circle cx="220" cy="552" r="220" fill="url(#glow-cyan)" />

  <g opacity="0.24">
    <path d="M110 112C256 52 454 56 614 136" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    <path d="M120 552C258 606 506 602 684 518" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
  </g>

